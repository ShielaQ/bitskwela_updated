<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // redirect back to index with the path as a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        l.hash
      );
    </script>
  </head>
</html>
