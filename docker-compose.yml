services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bitskwela
      POSTGRES_USER: bitskwela
      POSTGRES_PASSWORD: bitskwela
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitskwela -d bitskwela"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    environment:
      DJANGO_ENV: prod
      DJANGO_DEBUG: "False"
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173"
      DATABASE_URL: "postgresql://bitskwela:bitskwela@db:5432/bitskwela"
      DB_SSLMODE: "disable"
      SUPABASE_DB_URL: "${SUPABASE_DB_URL}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app

  frontend:
    build: ./Frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
